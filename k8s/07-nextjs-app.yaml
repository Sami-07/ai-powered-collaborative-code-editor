apiVersion: v1
kind: Service
metadata:
  name: nextjs-app
  namespace: code-collab
  labels:
    app: nextjs-app
spec:
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: nextjs-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
  namespace: code-collab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-app
  template:
    metadata:
      labels:
        app: nextjs-app
    spec:
      containers:
      - name: nextjs-app
        image: ${YOUR_DOCKER_REGISTRY}/code-collab-nextjs:latest  # Replace with your actual image
        ports:
        - containerPort: 3000
        env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_PASSWORD
        - name: JUDGE0_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: JUDGE0_HOST
        - name: JUDGE0_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: JUDGE0_PORT
        - name: JUDGE0_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JUDGE0_AUTH_TOKEN
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi" 